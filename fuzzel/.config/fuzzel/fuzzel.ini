[main]
font=JetBrainsMono Nerd Font:size=12
prompt=
placeholder=Search apps...
icon-theme=default
terminal=alacritty -e
lines=12
width=40
horizontal-pad=24
vertical-pad=8
inner-pad=6
line-height=28
letter-spacing=0
border-width=1
border-radius=0
selection-radius=4
match-mode=fzf
show-actions=false
hide-before-typing=false
counter=true
layer=overlay
keyboard-focus=exclusive
no-exit-on-keyboard-focus-loss=false
launch-prefix=

background-color='#1e1e2ed9'
text-color=cdd6f4
prompt-color=89b4fa
placeholder-color=585b70
input-color=cdd6f4
message-color=a6adc8
counter-color=585b70
match-color=f9e2af
selection-color=89b4fa
selection-text-color=1e1e2e
selection-match-color=f9e2af
border-color=89b4fa40
